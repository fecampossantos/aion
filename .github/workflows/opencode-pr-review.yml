name: OpenCode PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  opencode-review:
    name: OpenCode PR Review
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install OpenCode
        run: npm install -g opencode-ai@latest

      - name: Configure OpenCode auth
        run: |
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> $GITHUB_ENV
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> $GITHUB_ENV
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV

      - name: Get PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.pr_number }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Run OpenCode PR Review
        id: review
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          echo "Reviewing PR #$PR_NUMBER"
          
          # Use opencode pr command for built-in PR review
          opencode pr "$PR_NUMBER" --format json > review_result.json 2>&1 || true
          
          # Extract review content
          if [ -f review_result.json ]; then
            cat review_result.json
          fi

      - name: Post review comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewResult = fs.readFileSync('review_result.json', 'utf8');
            
            let reviewText = '';
            try {
              const parsed = JSON.parse(reviewResult);
              reviewText = parsed.content || parsed.message || reviewResult;
            } catch {
              reviewText = reviewResult;
            }

            // Truncate if too long for GitHub comment
            if (reviewText.length > 65000) {
              reviewText = reviewText.substring(0, 65000) + '\n\n---\n*Review truncated due to length*';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              body: `## 🤖 OpenCode Automated PR Review\n\n${reviewText}`
            });

      - name: Upload review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opencode-review-pr-${{ steps.pr.outputs.number }}
          path: review_result.json
          retention-days: 7

  # Optional: Run a quick smoke test to verify OpenCode works
  smoke-test:
    name: OpenCode Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenCode
        run: npm install -g opencode-ai@latest

      - name: Configure auth
        run: |
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> $GITHUB_ENV
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> $GITHUB_ENV
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV

      - name: Run smoke test
        run: |
          opencode run 'Respond with exactly: OPENCODE_SMOKE_OK'